{% extends "base.html" %}
{% block content %}
<form class="card max-600" method="post" action="/security/password">
  <h3>Alterar senha</h3>
  <input name="current_password" type="password" placeholder="Senha atual" required>
  <input name="new_password" type="password" placeholder="Nova senha" required>
  <input name="confirm_password" type="password" placeholder="Confirmar nova senha" required>
  <p>A senha deve conter: 12+ caracteres, maiúscula, minúscula, número e caractere especial.</p>
  <button type="submit">Atualizar senha</button>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  {% if success %}<p>{{ success }}</p>{% endif %}
</form>
{% endblock %}
