<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/static/style.css">
  <title>Login</title>
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <main style="min-height:100vh;display:grid;place-items:center;padding:24px;position:relative;z-index:1;">
    <section class="card" style="max-width:460px;width:100%;">
      <h2 style="margin-top:0;">Acesso ao Micro SaaS</h2>
      <form method="post" action="/login">
        <label>Usuário <input name="username" required></label>
        <label>Senha <input name="password" type="password" required></label>
        <button type="submit">Entrar</button>
      </form>
      <p>Usuário inicial: <strong>admin</strong> (senha via variável <code>ADMIN_INITIAL_PASSWORD</code>).</p>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </section>
  </main>
</body>
</html>
